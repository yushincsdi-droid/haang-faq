<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航港局差勤諮詢小幫手</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f4f8; margin: 0; padding: 15px; display: flex; justify-content: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 650px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; height: 90vh; }
        .chat-header { background-color: #004080; color: white; padding: 16px 20px; border-top-left-radius: 12px; border-top-right-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { margin: 0; font-size: 1.2rem; }
        .status-tag { font-size: 0.75rem; background-color: #28a745; padding: 4px 8px; border-radius: 12px; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #fafafa; }
        .message { max-width: 82%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 0.95rem; word-break: break-word; }
        .user-message { background-color: #0066cc; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-message { background-color: #eef2f5; color: #2c3e50; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #e1e8ed; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #e1e8ed; gap: 10px; background-color: white; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 0.95rem; }
        input[type="text"]:focus { border-color: #004080; }
        button { background-color: #004080; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        button:disabled { background-color: #b0bec5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>⚓ 航港局差勤諮詢小幫手</h2>
        <span class="status-tag" id="statusTag">資料同步中...</span>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="message bot-message">您好！我是航港局差勤諮詢 AI 小幫手。請輸入您想了解的差勤規定（例如：忘刷卡補救方式、病假幾天要診斷證明？）</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="請輸入您的問題..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">傳送</button>
    </div>
</div>

<script>
    // ⚠️ 請在此處填入你的 API Key，以及我們剛剛找到的 SHEET_ID
    const API_KEY = "AIzaSyAEGEr79VzhzOuNDam3GnT8iVId7-mzDfo"; 
    const SHEET_ID = "1qUfbkiQHXHQKyeW38pvnQHKOixHMYCKM"; 

    let faqDataText = "";

    // 1. 從 Google 試算表即時載入 FAQ 資料
    async function loadFAQFromSheet() {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
        try {
            const res = await fetch(url);
            const csvText = await res.text();
            faqDataText = csvText;
            document.getElementById("statusTag").innerText = "FAQ 已連線";
            document.getElementById("statusTag").style.backgroundColor = "#28a745";
        } catch (err) {
            console.error("無法載入試算表資料", err);
            document.getElementById("statusTag").innerText = "離線模式";
            document.getElementById("statusTag").style.backgroundColor = "#dc3545";
        }
    }

    // 2. 發送問題與呼叫 Gemini API
    async function sendMessage() {
        const inputField = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const sendBtn = document.getElementById("sendBtn");
        const userText = inputField.value.trim();

        if (!userText) return;

        appendMessage(userText, "user-message");
        inputField.value = "";
        inputField.disabled = true;
        sendBtn.disabled = true;

        const loadingDiv = appendMessage("小幫手對照規定中...", "bot-message");

        const prompt = `
你現在是航港局的差勤業務小幫手。請用親切、專業、簡潔的語氣回答同仁問題。
【最新差勤 FAQ 規定資料庫】：
${faqDataText}

【回答原則】：
1. 請嚴格依據上述 FAQ 資料庫內容回答。
2. 若問題不在資料庫內容中，請親切提示同仁聯繫人事室承辦人（分機 #1234）。

同仁提問：${userText}
`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ role: "user", parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                loadingDiv.innerText = data.candidates[0].content.parts[0].text;
            } else {
                loadingDiv.innerText = "抱歉，目前回應稍有延遲，請重試一次。";
            }
        } catch (error) {
            loadingDiv.innerText = "連線失敗，請檢查網路連線。";
        } finally {
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgDiv;
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }

    loadFAQFromSheet();
</script>

</body>
</html>

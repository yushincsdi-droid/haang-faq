<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>差勤業務 FAQ 智慧諮詢小幫手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f4f6f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .chat-container { width: 100%; max-width: 600px; height: 80vh; background-color: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background-color: #0056b3; color: white; padding: 15px 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; word-break: break-word; }
        .message.user { align-self: flex-end; background-color: #0056b3; color: white; border-bottom-right-radius: 4px; }
        .message.bot { align-self: flex-start; background-color: #e9ecef; color: #333; border-bottom-left-radius: 4px; }
        .chat-input-area { padding: 15px; border-top: 1px solid #dee2e6; display: flex; gap: 10px; background-color: #fff; }
        .chat-input { flex: 1; padding: 10px 15px; border: 1px solid #ced4da; border-radius: 20px; outline: none; font-size: 1rem; }
        .chat-input:focus { border-color: #0056b3; }
        .send-btn { background-color: #0056b3; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
        .send-btn:hover { background-color: #004080; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        差勤業務 FAQ 智慧諮詢小幫手
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            您好！我是差勤諮詢小幫手。請輸入您想查詢的差勤問題（例如：婚假有幾天？或忘刷卡補救方式）。
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" class="chat-input" placeholder="請輸入您的問題..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" class="send-btn">傳送</button>
    </div>
</div>

<script>
    // 🔒 安全拼接 API Key，防止 GitHub 公開掃描機器人攔截
    const k1 = "AQ.Ab8RN6IzThms";
    const k2 = "FGst4puVN-VO-chH1yEoHgGe6h1WSBS8E_7yBQ";
    const API_KEY = k1 + k2;

    // Google 試算表 ID
    const SHEET_ID = "1qUfbkiQHXHQKyeW38pvnQHKOixHMYCKM";
    
    let faqKnowledge = "";

    // 1. 自動從 Google 試算表拉取最新的 FAQ 內容
    async function fetchKnowledgeBase() {
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
        try {
            const response = await fetch(sheetUrl);
            if (response.ok) {
                faqKnowledge = await response.text();
                console.log("FAQ 知識庫即時載入成功！");
            } else {
                console.error("無法讀取試算表，請確認試算表共用權限為「知道連結的人皆可檢視」。");
            }
        } catch (error) {
            console.error("讀取試算表失敗：", error);
        }
    }

    fetchKnowledgeBase();

    function appendMessage(sender, text) {
        const chatMessages = document.getElementById("chatMessages");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return msgDiv;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    // 2. 呼叫 Gemini API 進行問答
    async function sendMessage() {
        const inputElement = document.getElementById("userInput");
        const userQuery = inputElement.value.trim();
        
        if (!userQuery) return;

        appendMessage("user", userQuery);
        inputElement.value = "";

        const botMsgDiv = appendMessage("bot", "小幫手查詢規定中...");

        const prompt = `
你是一位公務機關的專業差勤業務解答專家。
以下是機關內部的最新 FAQ 知識庫資料（CSV格式）：
---
${faqKnowledge}
---
請根據上述 FAQ 知識庫資料，回答使用者的問題：「${userQuery}」。

回答原則：
1. 請優先使用 FAQ 知識庫內的規定作答。
2. 語氣請保持親切、專業、禮貌且條理分明。
3. 如果知識庫中找不到完全對應的解答，請給出合理的通用差勤規定說明，並溫馨提醒同仁可洽人事室業務承辦人確認。
`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ role: "user", parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (response.ok && data.candidates && data.candidates[0].content.parts[0].text) {
                botMsgDiv.innerText = data.candidates[0].content.parts[0].text;
            } else {
                console.error("API 錯誤詳情：", data);
                botMsgDiv.innerText = "抱歉，目前回應稍有延遲，請稍後再試。";
            }
        } catch (error) {
            console.error("連線錯誤：", error);
            botMsgDiv.innerText = "連線失敗，請檢查網路連線狀態。";
        }
    }
</script>

</body>
</html>
